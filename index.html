<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Mailer — J Franco Marketing</title>
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/summary.css">
    <link rel="stylesheet" href="./css/animations.css">
</head>

<body>

    <!-- ═══════════════════════════ LANDING ═══ -->
    <main class="landing">
        <div class="landing__inner">

            <!-- Logo -->
            <div class="landing__logo">
                <img src="./images/logo-medium.png" alt="J Franco Marketing" class="landing__logo-img">
            </div>

            <!-- Headline -->
            <p class="t-eyebrow landing__eyebrow">Direct Mail Solutions · Step 1 of 4</p>
            <h1 class="t-display t-display--xl landing__title">
                Choose Your<br><em>Campaign</em>
            </h1>
            <p class="t-body landing__sub">
                Select the marketing category that fits your outreach strategy. You'll customize art, data, and options
                in the next steps.
            </p>

            <!-- Category Grid -->
            <div class="category-grid stagger-children" id="campaigns">

            </div>
            <!-- /category-grid -->

        </div>
    </main>

</body>
<script>
// -- GET DATA FROM GOOGLE SHEET SOURCE --

const GOOGLE_SHEET_ID = "1n-_CUr9HXY1x9UD3mMOMcHZ7gpt1k8-Q64X3I-_iyp8";

async function loadSheet(sheetname) {
    const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetname)}&headers=1`;

    const res = await fetch(url);
    const text = await res.text();

    // Google wraps JSON in a weird callback
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows;
    const headers = json.table.cols.map(col => col.label);

    return rows.map(row => {
        const obj = {};
            row.c.forEach((cell, i) => {
            obj[headers[i]] = cell ? cell.v : "";
        });
        return obj;
    });
}

async function loadCampaignList() {
    const rows = await loadSheet("Campaigns");

    return rows.map(row => ({
        type: row.Type,                  // must match sheet name
        label: row.Label,
        subLabel: row["Sub-label"],
        description: row.Description,
        sheetName: row.Type.trim()
    }));
}

function renderCampaigns(campaigns) {
    const container = document.getElementById("campaigns");
    container.innerHTML = "";

    campaigns.forEach(campaign => {
        const slug = campaign.type
            .toLowerCase()
            .replace(/\s+/g, "-");

        const card = document.createElement("a");
        card.href = `mailer-gallery?cat=${slug}`;
        card.className = "cat-card";

        card.innerHTML = `
            <span class="cat-card__arrow">→</span>
            <div class="cat-card__label">${campaign.label}</div>
            <div class="cat-card__desc">${campaign.description}</div>
        `;

        container.appendChild(card);
    });
}

window.onload = async function() {
    const campaigns = await loadCampaignList();
    renderCampaigns(campaigns);
}
</script>
</html>
